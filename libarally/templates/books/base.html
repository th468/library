<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-5">
            <nav>
                <a href="{% url 'accounts:index' %}">ホーム画面</a>
                <a href="{% url 'accounts:regist' %}">ユーザー登録画面</a>
                <a href="{% url 'accounts:login' %}">ログイン画面</a>
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:logout' %}">ログアウト</a>
                {% endif %}
                <a href="{% url 'accounts:info' %}">ユーザー画面</a>
                <a href="{% url 'books:booklist' %}">書籍一覧</a>
                <a href="{% url 'books:manageindex' %}">管理画面</a>
                
            </nav>
            <div class="mb-3">{{ user }}: {{user.is_authenticated }}</div>
            <div>
                {% block content %}
                {% endblock %}
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
