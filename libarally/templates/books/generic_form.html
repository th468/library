{% extends "books/base.html" %}
{% block content %}
<h2>{{ title|default:"データ登録"}}</h2>

<form method="post" novalidate>
    {% csrf_token%}

        <div class="mb-3">
            {{ form.as_p }}
        </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ cancel_url }}" class="btn btn-secondary">キャンセル</a>
</form>

{% endblock content %}
