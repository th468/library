{# 空状態プレースホルダー・コンポーネント #}
{# 引数: icon, title, message, link_url, link_text #}

<div class="text-center my-5 py-5 bg-white rounded-4 shadow-sm border">
    <div class="mb-4">
        <i class="bi {{ icon|default:'bi-inbox' }} text-muted opacity-25" style="font-size: 4rem;"></i>
    </div>
    <h4 class="h5 fw-bold text-dark mb-2">{{ title|default:'データが見つかりませんでした' }}</h4>
    <p class="text-muted small mb-4">{{ message|default:'条件を変えて再度お試しください。' }}</p>
    {% if link_url %}
        <a href="{{ link_url }}" class="btn btn-outline-primary rounded-pill px-4">
            {{ link_text|default:'戻る' }}
        </a>
    {% endif %}
</div>
